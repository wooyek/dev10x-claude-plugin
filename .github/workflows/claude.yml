name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body || '' }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          additional_permissions: |
            actions: read
          prompt: |
            ${{ github.event.comment.body || github.event.review.body || github.event.issue.body || github.event.issue.title }}

            CONTEXT:
            - Repository: ${{ github.repository }}
            - PR Number: ${{ github.event.issue.number || github.event.pull_request.number }}

            ---
            GUIDELINES:

            Read these files for context:
            1. CLAUDE.md - Repository conventions and patterns
            2. .claude/rules/README.md - Index of all rule files
            3. .claude/rules/review-checks-common.md - False positive prevention

            FOR PR REVIEWS:
            - Focus ONLY on changes in the PR, not the entire codebase
            - Use `gh pr diff [PR_NUMBER]` to see actual changes
            - Use `gh pr view [PR_NUMBER] --json files` to get changed files list
            - Load domain-specific agent specs from .claude/agents/ based on
              changed file types (see CLAUDE.md Code Review table)
            - Follow review workflow from .claude/rules/review-guidelines.md

            FOR COMMITS AND PR CREATION:
            Follow outcome-focused (JTBD) principles from `.claude/rules/git-jtbd.md`:
            - Shift from implementation details ("Add X") to user outcomes ("Enable Y")
            - Extract ticket ID from branch name (format: username/TICKET-ID/description)
            - Use appropriate gitmoji (see `.claude/rules/git-commits.md`)

            CODE VERIFICATION:
            Before claiming code contains an error:
            - Read the actual code file — never rely on diff snippets alone
            - For multi-commit PRs, verify the issue still exists in the latest commit
            - Quote exact code when making claims about errors

            Be brief but thorough. Be constructive and helpful.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          claude_args: '--allowed-tools "Read,mcp__github_inline_comment__create_inline_comment,mcp__github__get_pull_request_review_comments,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh api:*)"'

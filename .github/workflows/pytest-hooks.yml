name: Hook Tests

on:
  push:
    branches: [develop]
    paths:
      - "hooks/**"
      - "tests/hooks/**"
      - "pyproject.toml"
      - ".github/workflows/pytest-hooks.yml"
  pull_request:
    branches: [develop]
    paths:
      - "hooks/**"
      - "tests/hooks/**"
      - "pyproject.toml"
      - ".github/workflows/pytest-hooks.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run hook tests
        run: uv run --extra dev pytest tests/hooks/ -v --tb=short

# Skill family grouping for SKILLS.md index.
# Each family has a label, description, and ordered list of skill
# display-names (what users type). Hidden skills (hidden.yaml)
# are excluded before grouping.
#
# display_map translates display-names to internal invocation-name
# keys from SKILL.md. Skills not in display_map match by exact key.

display_map:
  commit: dev10x:git-commit
  commit:split: dev10x:git-commit-split
  commit:fixup: dev10x:git-fixup
  commit:to-new-ticket: dev10x:git-promote
  branch:groom: dev10x:git-groom
  pr:create: dev10x:gh-pr-create
  pr:respond: dev10x:gh-pr-respond
  pr:monitor: dev10x:gh-pr-monitor
  pr:request-review: dev10x:gh-pr-request-review
  pr:triage: dev10x:gh-pr-triage
  pr:comment-fixup: dev10x:gh-pr-fixup
  ticket:work-on: dev10x:work-on
  logs: logs:start
  dev10x:investigate: investigate
  triage-sentry: triage-sentry
  tt-db: tt:db
  release-notes: dev10x:release-notes

families:
  - label: Pipeline
    description: "Scope → branch → implement → PR"
    skills:
      - ticket:work-on
      - dev10x:playbook
      - ticket:scope
      - ticket:create
      - ticket:branch

  - label: Git
    description: "Atomic commits, clean history"
    skills:
      - commit
      - commit:split
      - commit:fixup
      - branch:groom
      - commit:to-new-ticket

  - label: PR
    description: "Full PR lifecycle with review agents"
    skills:
      - pr:create
      - pr:review
      - pr:respond
      - pr:monitor
      - pr:request-review
      - pr:triage
      - pr:comment-fixup

  - label: Session
    description: "Track progress, defer & resume work"
    skills:
      - dev10x:session-wrap-up
      - dev10x:park
      - dev10x:park-discover

  - label: Testing
    description: "pytest, e2e, QA"
    skills:
      - test
      - test:fix-flaky
      - tt:e2e-debug
      - dev10x:qa-scope
      - dev10x:qa-self

  - label: Ops
    description: "k8s logs, payment & device debugging"
    skills:
      - logs
      - debug:payments
      - debug:square-terminal
      - dev10x:investigate
      - triage-sentry
      - inbox:triage

  - label: Data
    description: "Schema context, safe queries, KPI"
    skills:
      - tt-db
      - dev10x-db-psql
      - report:pos-gpv

  - label: Reports
    description: "Standups, summaries, release notes"
    skills:
      - work:daily
      - work:weekly
      - work:summary
      - release-notes
      - release:safe-to-ship

  - label: Meta
    description: "Create skills, audit usage, code review"
    skills:
      - dev10x:skill-create
      - dev10x:skill-audit
      - dev10x:skill-index
      - review

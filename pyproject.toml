[project]
name = "dev10x-ai"
version = "0.27.0"
description = "Claude Code plugin providing reusable skills, hooks, and commands"
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.9",
]

[tool.pytest.ini_options]
norecursedirs = ["codex-skills"]
testpaths = ["hooks/scripts"]

[tool.ruff]
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
